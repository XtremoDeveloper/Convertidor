<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabCanvas - Realtime Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #code-editor { outline: none; tab-size: 4; min-height: 100%; white-space: pre-wrap; }
        .active-file { background-color: #f0f4ff; border-left: 4px solid #4f46e5; color: #4f46e5; font-weight: 600; }
        #auth-overlay { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <!-- Pantalla de Bloqueo / Password Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-gray-900/80 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md text-center">
            <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-indigo-600 w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Proyecto Protegido</h2>
            <p id="project-label" class="text-gray-500 mb-6 text-sm">Cargando proyecto...</p>
            <input type="password" id="pass-input" placeholder="Ingresa la contraseña" 
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl mb-4 text-center focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <button onclick="checkPassword()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                Acceder al Editor
            </button>
            <p id="auth-error" class="text-red-500 text-xs mt-4 hidden">Contraseña incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-md">
                <i data-lucide="zap" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 id="project-title" class="text-lg font-bold text-gray-800 leading-none">Cargando...</h1>
                <span id="sync-status" class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Iniciando...</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-2 bg-gray-100 px-3 py-1.5 rounded-full border border-gray-200">
                <i data-lucide="globe" class="w-3.5 h-3.5 text-gray-500"></i>
                <span id="user-display" class="text-xs text-gray-600 font-mono">Modo Realtime</span>
            </div>
            <button onclick="saveCurrentFile()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-indigo-200">
                <i data-lucide="save" class="w-4 h-4"></i> Guardar Cambios
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/30">
                <span class="text-xs font-black text-gray-400 uppercase tracking-tighter">Archivos del Proyecto</span>
                <button onclick="createNewFile()" class="p-1.5 hover:bg-indigo-50 rounded text-indigo-600 transition-colors">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="file-tree" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                <!-- Sincronizado con Firebase -->
            </div>
        </aside>

        <!-- Editor Area -->
        <section class="flex-1 flex flex-col bg-[#0d1117] overflow-hidden">
            <div class="bg-[#161b22] border-b border-gray-800 px-4 py-2 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <i data-lucide="file-code" class="w-4 h-4 text-blue-400"></i>
                    <span id="active-filename" class="text-gray-300 text-sm font-medium">Selecciona un archivo</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyContent()" class="p-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <div id="line-numbers" class="w-12 pt-6 text-right pr-3 text-gray-700 font-mono text-xs bg-[#0d1117] border-r border-gray-800/50 select-none">
                    1
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <div id="code-editor" contenteditable="false" class="code-font p-6 text-sm text-gray-300 leading-relaxed spellcheck-false" spellcheck="false"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE
        // Si dejas "TU_API_KEY", el sistema intentará usar la configuración automática del entorno para evitar errores.
        const manualConfig = {
        authDomain: "AIzaSyDNeN0AIcXw0aAiwc6S7472y7YMjHzbV94",
        databaseURL: "https://tienda-virtual-883ef-default-rtdb.firebaseio.com",
        projectId: "tienda-virtual-883ef",
        };

        // Lógica para decidir qué configuración usar
        let firebaseConfig;
        if (manualConfig.apiKey === "TU_API_KEY") {
            // Usar configuración del entorno si no se ha configurado manualmente
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = manualConfig;
        }

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        // Identificador de la App (limpio para rutas de Firebase)
        const canvasAppId = "collab_realtime_v2";

        // Gestión de Proyecto via URL (?project=Nombre)
        const urlParams = new URLSearchParams(window.location.search);
        const rawProjectId = urlParams.get('project') || 'demo';
        const projectId = rawProjectId.replace(/[.#$\[\]]/g, '_');
        
        document.getElementById('project-label').textContent = `Accediendo a: ${projectId}`;
        document.getElementById('project-title').textContent = `Proyecto: ${projectId}`;

        let currentProjectData = null;
        let activeFileId = null;
        let isAuthorized = false;

        // --- LÓGICA DE AUTENTICACIÓN ---
        window.checkPassword = async function() {
            const input = document.getElementById('pass-input').value;
            // Aseguramos que la ruta no contenga caracteres inválidos para Firebase RTDB
            const sanitizedAppId = canvasAppId.replace(/[.#$\[\]]/g, '_');
            const sanitizedProjId = projectId.replace(/[.#$\[\]]/g, '_');
            const projectPath = `artifacts/${sanitizedAppId}/public/data/collab_projects/${sanitizedProjId}`;
            const projectRef = ref(db, projectPath);

            try {
                const snapshot = await get(projectRef);
                const data = snapshot.val();

                if (!data) {
                    // Si el proyecto no existe, se crea con la contraseña ingresada
                    const initialData = {
                        password: input || "12345",
                        files: {
                            "main": { id: "main", name: "index.html", content: "<!-- Bienvenido al proyecto colaborativo -->\n<h1>¡Hola Mundo!</h1>" }
                        }
                    };
                    await set(projectRef, initialData);
                    enterEditor(initialData);
                } else {
                    if (data.password === input) {
                        enterEditor(data);
                    } else {
                        document.getElementById('auth-error').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error("Firebase Error:", error);
                alert("Error al conectar con la base de datos. Verifica tu configuración de Firebase.");
            }
        };

        function enterEditor(data) {
            isAuthorized = true;
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('sync-status').textContent = "Conectado";
            startRealtimeSync();
        }

        // --- LÓGICA EN TIEMPO REAL ---
        function startRealtimeSync() {
            const projectRef = ref(db, `artifacts/${canvasAppId}/public/data/collab_projects/${projectId}/files`);
            
            onValue(projectRef, (snapshot) => {
                const files = snapshot.val();
                if (files) {
                    currentProjectData = files;
                    updateFileTree();
                    
                    if (activeFileId && files[activeFileId]) {
                        const editor = document.getElementById('code-editor');
                        if (editor.innerText !== files[activeFileId].content) {
                            editor.innerText = files[activeFileId].content;
                            updateLineNumbers();
                        }
                    }
                }
            }, (error) => {
                console.error("Error de sincronización:", error);
            });
        }

        window.saveCurrentFile = async function() {
            if (!isAuthorized || !activeFileId) return;
            
            const content = document.getElementById('code-editor').innerText;
            const fileRef = ref(db, `artifacts/${canvasAppId}/public/data/collab_projects/${projectId}/files/${activeFileId}`);
            
            document.getElementById('sync-status').textContent = "Sincronizando...";
            try {
                await update(fileRef, { content: content });
                document.getElementById('sync-status').textContent = "Sincronizado";
            } catch (e) {
                console.error(e);
                document.getElementById('sync-status').textContent = "Error";
            }
        };

        // --- ASISTENTES DE INTERFAZ ---
        function updateFileTree() {
            const tree = document.getElementById('file-tree');
            tree.innerHTML = '';
            
            if (!currentProjectData) return;

            Object.values(currentProjectData).forEach(file => {
                const item = document.createElement('div');
                item.className = `flex items-center gap-2 py-2 px-3 cursor-pointer rounded-md text-sm mb-1 group ${activeFileId === file.id ? 'active-file' : 'hover:bg-gray-100 text-gray-600'}`;
                item.innerHTML = `
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                    <span class="flex-1">${file.name}</span>
                `;
                item.onclick = () => selectFile(file.id);
                tree.appendChild(item);
            });
            lucide.createIcons();
        }

        function selectFile(id) {
            activeFileId = id;
            const file = currentProjectData[id];
            const editor = document.getElementById('code-editor');
            
            editor.innerText = file.content;
            editor.contentEditable = "true";
            document.getElementById('active-filename').textContent = file.name;
            
            updateFileTree();
            updateLineNumbers();
        }

        window.createNewFile = async function() {
            if (!isAuthorized) return;
            const name = prompt("Nombre del nuevo archivo:");
            if (!name) return;
            
            const newId = Date.now().toString();
            const fileRef = ref(db, `artifacts/${canvasAppId}/public/data/collab_projects/${projectId}/files/${newId}`);
            
            await set(fileRef, {
                id: newId,
                name: name,
                content: `// Nuevo archivo: ${name}`
            });
            selectFile(newId);
        };

        function updateLineNumbers() {
            const editor = document.getElementById('code-editor');
            const lines = editor.innerText.split('\n').length || 1;
            const lineContainer = document.getElementById('line-numbers');
            lineContainer.innerHTML = Array.from({length: Math.max(lines, 30)}, (_, i) => i + 1).join('<br>');
        }

        window.copyContent = function() {
            const text = document.getElementById('code-editor').innerText;
            navigator.clipboard.writeText(text);
            document.getElementById('sync-status').textContent = "Copiado";
            setTimeout(() => document.getElementById('sync-status').textContent = "Sincronizado", 1500);
        }

        // Inicializar iconos
        lucide.createIcons();

        async function initApp() {
            try {
                // Intento de autenticación con respaldo para entorno de desarrollo
                if (firebaseConfig.apiKey !== "TU_API_KEY") {
                     await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error en Auth:", error);
            }
        }
        initApp();
    </script>
</body>
</html>
