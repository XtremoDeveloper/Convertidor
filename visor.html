<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCanvas Cloud - Realtime Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #code-editor { outline: none; tab-size: 4; min-height: 100%; white-space: pre; }
        .active-file { background-color: #f0f4ff; border-left: 4px solid #4f46e5; color: #4f46e5; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-md">
                <i data-lucide="database" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800 leading-none">Realtime Canvas</h1>
                <span id="sync-status" class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Conectando...</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-2 bg-gray-100 px-3 py-1.5 rounded-full border border-gray-200">
                <i data-lucide="user" class="w-3.5 h-3.5 text-gray-500"></i>
                <span id="user-display" class="text-xs text-gray-600 font-mono">Invitado</span>
            </div>
            <button onclick="saveProject()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-indigo-200">
                <i data-lucide="cloud-upload" class="w-4 h-4"></i> Guardar en Nube
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/30">
                <span class="text-xs font-black text-gray-400 uppercase tracking-tighter">Explorador</span>
                <button onclick="createNewFile()" class="p-1.5 hover:bg-indigo-50 rounded text-indigo-600 transition-colors">
                    <i data-lucide="plus-square" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="file-tree" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                <!-- Los archivos se cargarán aquí -->
            </div>
        </aside>

        <!-- Editor Area -->
        <section class="flex-1 flex flex-col bg-[#0d1117] overflow-hidden">
            <div class="bg-[#161b22] border-b border-gray-800 px-4 py-2 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <i data-lucide="file-code" class="w-4 h-4 text-blue-400"></i>
                    <span id="active-filename" class="text-gray-300 text-sm font-medium">Sin archivo seleccionado</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyContent()" class="p-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <div id="line-numbers" class="w-12 pt-6 text-right pr-3 text-gray-700 font-mono text-xs bg-[#0d1117] border-r border-gray-800/50 select-none">
                    1
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <div id="code-editor" contenteditable="false" class="code-font p-6 text-sm text-gray-300 leading-relaxed spellcheck-false" spellcheck="false"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE DINÁMICA
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let projectData = {
            files: [
                { id: '1', name: 'index.html', content: '<h1>Hola Mundo</h1>' }
            ]
        };
        let activeFileId = null;

        // Autenticación con manejo de errores y reintentos
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticación:", error);
                document.getElementById('sync-status').textContent = "Error de Auth";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display').textContent = `ID: ${user.uid.substring(0,8)}`;
                syncFromCloud();
            } else {
                initAuth();
            }
        });

        // Cargar datos desde Realtime Database usando la ruta obligatoria de Canvas
        function syncFromCloud() {
            if (!currentUser) return;
            // Siguiendo la REGLA 1: /artifacts/{appId}/public/data/{collectionName}
            const projectRef = ref(db, `artifacts/${appId}/public/data/projects/${currentUser.uid}`);
            
            onValue(projectRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    projectData = data;
                    updateUI();
                    document.getElementById('sync-status').textContent = "Sincronizado";
                } else {
                    document.getElementById('sync-status').textContent = "Nuevo Proyecto";
                }
            }, (error) => {
                console.error("Error de lectura:", error);
                document.getElementById('sync-status').textContent = "Error de Lectura";
            });
        }

        // Guardar datos en Realtime Database
        window.saveProject = async function() {
            if (!currentUser) return;
            
            if (activeFileId) {
                const file = projectData.files.find(f => f.id === activeFileId);
                if (file) file.content = document.getElementById('code-editor').innerText;
            }

            document.getElementById('sync-status').textContent = "Guardando...";
            try {
                const projectRef = ref(db, `artifacts/${appId}/public/data/projects/${currentUser.uid}`);
                await set(projectRef, projectData);
                document.getElementById('sync-status').textContent = "Guardado con éxito";
                setTimeout(() => document.getElementById('sync-status').textContent = "Sincronizado", 2000);
            } catch (error) {
                console.error("Error al guardar:", error);
                document.getElementById('sync-status').textContent = "Error al Guardar";
            }
        }

        function updateUI() {
            const tree = document.getElementById('file-tree');
            tree.innerHTML = '';
            
            projectData.files.forEach(file => {
                const item = document.createElement('div');
                item.className = `flex items-center gap-2 py-2 px-3 cursor-pointer rounded-md text-sm mb-1 group ${activeFileId === file.id ? 'active-file' : 'hover:bg-gray-100 text-gray-600'}`;
                item.innerHTML = `
                    <i data-lucide="file" class="w-4 h-4"></i>
                    <span class="flex-1">${file.name}</span>
                    <button onclick="deleteFile('${file.id}')" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                item.onclick = (e) => {
                    if (e.target.closest('button')) return;
                    selectFile(file.id);
                };
                tree.appendChild(item);
            });
            lucide.createIcons();
            updateLineNumbers();
        }

        function selectFile(id) {
            if (activeFileId) {
                const prevFile = projectData.files.find(f => f.id === activeFileId);
                if (prevFile) prevFile.content = document.getElementById('code-editor').innerText;
            }

            activeFileId = id;
            const file = projectData.files.find(f => f.id === id);
            const editor = document.getElementById('code-editor');
            
            editor.innerText = file.content;
            editor.contentEditable = "true";
            document.getElementById('active-filename').textContent = file.name;
            
            updateUI();
        }

        window.createNewFile = function() {
            const name = prompt("Nombre del archivo:");
            if (!name) return;
            const newFile = {
                id: Date.now().toString(),
                name: name,
                content: `// Nuevo archivo: ${name}`
            };
            projectData.files.push(newFile);
            selectFile(newFile.id);
        }

        window.deleteFile = function(id) {
            if (!confirm("¿Eliminar archivo?")) return;
            projectData.files = projectData.files.filter(f => f.id !== id);
            if (activeFileId === id) {
                activeFileId = null;
                document.getElementById('code-editor').innerText = '';
                document.getElementById('code-editor').contentEditable = "false";
                document.getElementById('active-filename').textContent = "Sin archivo";
            }
            updateUI();
        }

        function updateLineNumbers() {
            const editor = document.getElementById('code-editor');
            const lines = editor.innerText.split('\n').length || 1;
            const lineContainer = document.getElementById('line-numbers');
            lineContainer.innerHTML = Array.from({length: Math.max(lines, 30)}, (_, i) => i + 1).join('<br>');
        }

        document.getElementById('code-editor').oninput = updateLineNumbers;

        window.copyContent = function() {
            const text = document.getElementById('code-editor').innerText;
            navigator.clipboard.writeText(text);
            document.getElementById('sync-status').textContent = "Copiado";
        }

        updateUI();
    </script>
</body>
</html>
