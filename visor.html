<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCanvas - IDE Pro con Persistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .folder-item:hover .delete-btn {
            display: flex;
        }
        
        .active-file {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
        }

        #code-editor {
            outline: none;
            tab-size: 4;
            min-height: 100%;
        }

        .delete-btn {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg">
                <i data-lucide="layout" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-semibold text-gray-800 tracking-tight">CodeCanvas <span class="text-indigo-600">v2.1</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="resetStorage()" class="text-xs text-red-500 hover:underline">Limpiar todo</button>
            <div id="status-msg" class="text-sm text-gray-400 font-medium">Autoguardado activado</div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Explorador</span>
                <div class="flex gap-1">
                    <button onclick="triggerImport()" title="Importar" class="p-1.5 hover:bg-white hover:shadow-sm rounded transition-all text-gray-500 hover:text-indigo-600">
                        <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    </button>
                    <button onclick="promptNewItem()" title="Nuevo archivo o carpeta" class="p-1.5 hover:bg-white hover:shadow-sm rounded transition-all text-gray-500 hover:text-indigo-600">
                        <i data-lucide="plus-square" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <input type="file" id="file-import" class="hidden" onchange="handleFileImport(event)">
            
            <div id="file-tree" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                <!-- Arbol de archivos -->
            </div>
        </aside>

        <!-- Editor Area -->
        <section class="flex-1 flex flex-col bg-[#0d1117] overflow-hidden">
            <!-- Editor Navbar -->
            <div id="editor-header" class="bg-[#161b22] border-b border-gray-800 px-4 py-2 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div id="file-icon-wrapper">
                        <i data-lucide="file-text" class="w-4 h-4 text-gray-500"></i>
                    </div>
                    <span id="current-filename" class="text-gray-300 text-sm font-medium truncate">Sin archivo seleccionado</span>
                    <span id="unsaved-indicator" class="hidden w-2 h-2 rounded-full bg-indigo-500 shrink-0"></span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-copy" class="p-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md transition-colors" title="Copiar todo">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <button id="btn-download" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-md text-xs font-semibold flex items-center gap-2 transition-all shadow-lg shadow-indigo-900/20">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Exportar
                    </button>
                </div>
            </div>

            <!-- Main Editor Body -->
            <div class="flex-1 flex overflow-hidden">
                <div id="line-numbers" class="w-12 pt-6 text-right pr-3 text-gray-700 code-font text-xs bg-[#0d1117] select-none border-r border-gray-800/50">
                    1
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <pre id="code-editor" 
                         contenteditable="false" 
                         class="code-font p-6 text-sm text-gray-300 leading-relaxed whitespace-pre spellcheck-false"
                         spellcheck="false"></pre>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Clave para localStorage
        const STORAGE_KEY = 'codecanvas_project_v2';

        // Estructura por defecto
        const defaultProject = [
            {
                id: 'root',
                name: 'PROYECTO',
                type: 'folder',
                isOpen: true,
                children: [
                    { id: '1', name: 'index.html', type: 'file', content: '<!DOCTYPE html>\n<html>\n<body>\n  <h1>Hola Mundo</h1>\n  <p>Tus cambios se guardarán automáticamente.</p>\n</body>\n</html>' }
                ]
            }
        ];

        // Cargar datos persistidos o los por defecto
        let projectFiles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultProject;
        let activeFile = null;

        const fileTreeEl = document.getElementById('file-tree');
        const codeEditor = document.getElementById('code-editor');
        const lineNumbers = document.getElementById('line-numbers');
        const currentFilenameEl = document.getElementById('current-filename');
        const statusMsg = document.getElementById('status-msg');
        const unsavedIndicator = document.getElementById('unsaved-indicator');

        // Función para guardar en localStorage
        function saveToStorage() {
            if (activeFile) activeFile.content = codeEditor.innerText;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projectFiles));
        }

        // Generar el explorador
        function renderTree(files, container, level = 0) {
            files.forEach(file => {
                const item = document.createElement('div');
                item.className = `folder-item flex items-center gap-2 py-1.5 px-3 cursor-pointer rounded-md transition-all text-sm mb-0.5 group relative`;
                item.style.paddingLeft = `${(level * 16) + 12}px`;

                const icon = document.createElement('i');
                icon.className = 'w-4 h-4 flex-shrink-0';
                
                if (file.type === 'folder') {
                    icon.setAttribute('data-lucide', file.isOpen ? 'chevron-down' : 'chevron-right');
                    icon.classList.add(file.isOpen ? 'text-indigo-500' : 'text-gray-400');
                    
                    item.onclick = (e) => {
                        e.stopPropagation();
                        file.isOpen = !file.isOpen;
                        saveToStorage();
                        refreshUI();
                    };
                } else {
                    icon.setAttribute('data-lucide', 'file');
                    icon.classList.add('text-blue-400');
                    
                    if (activeFile && activeFile.id === file.id) {
                        item.classList.add('active-file', 'bg-indigo-50/50', 'text-indigo-700', 'font-semibold');
                    } else {
                        item.classList.add('text-gray-600');
                    }

                    item.onclick = (e) => {
                        e.stopPropagation();
                        selectFile(file);
                    };
                }

                const label = document.createElement('span');
                label.textContent = file.name;
                label.className = "truncate flex-1";

                const delBtn = document.createElement('button');
                delBtn.className = "delete-btn p-1 hover:bg-red-100 text-red-500 rounded transition-colors";
                delBtn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteItem(file.id);
                };

                item.appendChild(icon);
                item.appendChild(label);
                item.appendChild(delBtn);
                container.appendChild(item);

                if (file.type === 'folder' && file.isOpen && file.children) {
                    renderTree(file.children, container, level + 1);
                }
            });
            lucide.createIcons();
        }

        function refreshUI() {
            fileTreeEl.innerHTML = '';
            renderTree(projectFiles, fileTreeEl);
        }

        function selectFile(file) {
            if (activeFile) {
                activeFile.content = codeEditor.innerText;
            }

            activeFile = file;
            currentFilenameEl.textContent = file.name;
            codeEditor.contentEditable = "true";
            codeEditor.innerText = file.content;
            unsavedIndicator.classList.add('hidden');
            
            updateLineNumbers();
            showStatus(`Archivo: ${file.name}`);
            refreshUI();
            saveToStorage();
        }

        function updateLineNumbers() {
            const lines = codeEditor.innerText.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        codeEditor.oninput = () => {
            if (activeFile) {
                activeFile.content = codeEditor.innerText;
                unsavedIndicator.classList.remove('hidden');
                updateLineNumbers();
                saveToStorage(); // Guardado automático mientras escribes
            }
        };

        function deleteItem(id) {
            if (id === 'root') return;

            function findAndRemove(list) {
                for (let i = 0; i < list.length; i++) {
                    if (list[i].id === id) {
                        if (list[i].type === 'folder' && list[i].children.length > 0) {
                            if (!confirm(`¿Borrar la carpeta "${list[i].name}" y todo su contenido?`)) return false;
                        }
                        if (activeFile && activeFile.id === id) {
                            activeFile = null;
                            codeEditor.innerText = "";
                            codeEditor.contentEditable = "false";
                            currentFilenameEl.textContent = "Sin archivo seleccionado";
                        }
                        list.splice(i, 1);
                        return true;
                    }
                    if (list[i].children && findAndRemove(list[i].children)) return true;
                }
                return false;
            }

            if (findAndRemove(projectFiles)) {
                saveToStorage();
                showStatus("Eliminado");
                refreshUI();
            }
        }

        function promptNewItem() {
            const path = prompt("Ruta/Nombre (ej: css/styles.css):");
            if (!path) return;

            const parts = path.split('/');
            let currentLevel = projectFiles[0].children;

            parts.forEach((part, index) => {
                const isLast = index === parts.length - 1;
                let existing = currentLevel.find(f => f.name === part);

                if (!existing) {
                    const newItem = {
                        id: Math.random().toString(36).substr(2, 9),
                        name: part,
                        type: isLast ? 'file' : 'folder',
                        content: isLast ? `/* Nuevo archivo: ${part} */\n` : '',
                        isOpen: true,
                        children: isLast ? null : []
                    };
                    currentLevel.push(newItem);
                    existing = newItem;
                    if (isLast) selectFile(newItem);
                }
                
                if (existing.type === 'folder') {
                    currentLevel = existing.children;
                }
            });
            saveToStorage();
            refreshUI();
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const newFile = {
                    id: Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    type: 'file',
                    content: e.target.result
                };
                projectFiles[0].children.push(newFile);
                selectFile(newFile);
                saveToStorage();
                showStatus('Importado');
            };
            reader.readAsText(file);
        }

        function triggerImport() { document.getElementById('file-import').click(); }

        function resetStorage() {
            if (confirm("¿Seguro que quieres borrar todos tus archivos locales? No se puede deshacer.")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        document.getElementById('btn-download').onclick = () => {
            if (!activeFile) return;
            const blob = new Blob([codeEditor.innerText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFile.name;
            a.click();
        };

        document.getElementById('btn-copy').onclick = () => {
            if (!activeFile) return;
            const textArea = document.createElement("textarea");
            textArea.value = codeEditor.innerText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showStatus('Copiado');
        };

        function showStatus(text) {
            const old = statusMsg.textContent;
            statusMsg.textContent = text;
            setTimeout(() => { statusMsg.textContent = old; }, 2000);
        }

        codeEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '    ');
            }
        });

        window.onload = refreshUI;
    </script>
</body>
</html>
